<body class="page">
  <header class="site-header header-transparent" id="site-header">
    <a href="../index.html" class="logo">
      <img class="logo-main" src="../assets/images/logo-maroc-home-transparent.png" alt="Maroc Home" width="140" height="38">
      <img class="logo-home" src="../assets/images/logo-maroc-home-transparent.png" alt="" width="140" height="38" aria-hidden="true">

  <main class="main">
    <header class="page-header">
      <h1 class="page-title">Réalisations</h1>
      <p class="page-subtitle">SÉLECTION DE PROJETS RÉALISÉS</p>
    </header>

    <!-- Filtres -->
    <div class="filters">
      <button type="button" class="filter-btn active" data-filter="all">Avis clients</button>
      <button type="button" class="filter-btn" data-filter="traditionnel">Coulisses de chantier</button>
      <button type="button" class="filter-btn" data-filter="moderne">Pièces signatures</button>
      <button type="button" class="filter-btn" data-filter="futuriste">Futuriste</button>
    </div>

    <section class="projects-section">
      <div class="projects-grid" id="projects-grid">
        <!-- Onglet “Avis clients” (vignettes) -->
        <div class="project-card reveal" data-category="avis">
          <img src="../assets/images/realisation-1-carte.png" alt="Table en travertin" loading="lazy" width="800" height="600">
          <button type="button" class="avis-link" data-avis-index="0">Client</button>
        </div>
        <div class="project-card reveal" data-category="avis">
          <img src="../assets/images/home-projet-2.png" alt="Table à manger intérieure" loading="lazy" width="800" height="600">
          <button type="button" class="avis-link" data-avis-index="1">Client</button>
        </div>
        <div class="project-card reveal" data-category="avis">
          <img src="../assets/images/home-projet-3.png" alt="Salle a manger avec table et chaises" loading="lazy" width="800" height="600">
          <button type="button" class="avis-link" data-avis-index="2">Client</button>
        </div>
        <div class="project-card reveal" data-category="avis">
          <img src="../assets/images/home-projet-4.png" alt="Table ronde en pierre avec chaises" loading="lazy" width="800" height="600">
          <button type="button" class="avis-link" data-avis-index="3">Client</button>
        </div>
        <div class="project-card reveal" data-category="avis">
          <img src="../assets/images/home-projet-5.png" alt="Table ronde en travertin avec assises claires" loading="lazy" width="800" height="600">
          <button type="button" class="avis-link" data-avis-index="4">Client</button>
        </div>
        <div class="project-card reveal" data-category="avis">
          <img src="../assets/images/home-projet-6.png" alt="Console en pierre verte" loading="lazy" width="800" height="600">
          <button type="button" class="avis-link" data-avis-index="5">Client</button>
        </div>

        <!-- Onglet “Les chantiers en réel” (vidéos) -->
        <div class="project-card reveal" data-category="traditionnel" data-video-card="maroc">
          <img class="project-thumb project-thumb--image" src="../assets/images/home-projet-5.png" alt="Chantier en réel" loading="lazy" width="800" height="600">
          <video class="project-thumb project-thumb--video project-video" autoplay muted loop playsinline preload="auto" poster="../assets/images/home-projet-5.png" controls>
            <source src="../assets/videos/video-maroc.mp4" type="video/mp4">
          </video>
        </div>
        <div class="project-card reveal" data-category="traditionnel" data-video-card="maroc-3">
          <img class="project-thumb project-thumb--image" src="../assets/images/home-projet-6.png" alt="Chantier en réel" loading="lazy" width="800" height="600">
          <video class="project-thumb project-thumb--video project-video" autoplay muted loop playsinline preload="auto" poster="../assets/images/home-projet-6.png" controls>
            <source src="../assets/videos/video-maroc-3.mp4" type="video/mp4">
          </video>
        </div>
        <div class="project-card reveal" data-category="traditionnel" data-video-card="maroc-4">
          <img class="project-thumb project-thumb--image" src="../assets/images/home-projet-6.png" alt="Chantier en réel" loading="lazy" width="800" height="600">
          <video class="project-thumb project-thumb--video project-video" autoplay muted loop playsinline preload="auto" poster="../assets/images/home-projet-6.png" controls>

        <div class="project-card reveal" data-category="traditionnel" data-video-card="maroc-5">

        <div class="project-card reveal" data-category="traditionnel" data-video-card="maroc-6">
          <img class="project-thumb project-thumb--image" src="../assets/images/home-projet-6.png" alt="Chantier en réel" loading="lazy" width="800" height="600">
          <video class="project-thumb project-thumb--video project-video" autoplay muted loop playsinline preload="auto" poster="../assets/images/home-projet-6.png" controls>
            <source src="../assets/videos/video-maroc-6.mp4" type="video/mp4">
