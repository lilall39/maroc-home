<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – Assia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/variables.css">
  <link rel="stylesheet" href="../styles/reset.css">
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/contact.css">
</head>
<body class="page">
  <header class="site-header light" id="site-header">
    <a href="../index.html" class="logo">Assia</a>
    <button class="nav-toggle" id="nav-toggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <nav class="nav" aria-label="Navigation principale">
      <ul class="nav-list" id="nav-list">
        <li><a href="../index.html" class="nav-link">Accueil</a></li>
        <li><a href="projets.html" class="nav-link">Projets</a></li>
        <li><a href="a-propos.html" class="nav-link">À propos</a></li>
        <li><a href="contact.html" class="nav-link">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="main">
    <header class="contact-header">
      <h1 class="page-title">Contact</h1>
      <p class="page-subtitle">Parlez-nous de votre projet. Nous vous recontactons sous 48 h.</p>
    </header>

    <section class="contact-section">
      <div class="contact-inner">
        <form class="contact-form reveal" id="contact-form" action="#" method="post">
          <div class="form-group">
            <label for="name">Nom</label>
            <input type="text" id="name" name="name" required placeholder="Votre nom">
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="votre@email.fr">
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" required placeholder="Décrivez votre projet en quelques mots…"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Envoyer</button>
        </form>

        <div class="contact-info reveal">
          <h3>Coordonnées</h3>
          <p>
            <a href="mailto:contact@agence-assia.fr">contact@agence-assia.fr</a>
          </p>
          <p>Paris, France</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <nav class="footer-nav" aria-label="Navigation secondaire">
        <a href="../index.html" class="footer-link">Accueil</a>
        <a href="projets.html" class="footer-link">Projets</a>
        <a href="a-propos.html" class="footer-link">À propos</a>
        <a href="contact.html" class="footer-link">Contact</a>
      </nav>
      <div class="footer-contact">
        <a href="mailto:contact@agence-assia.fr">contact@agence-assia.fr</a><br>
        Paris, France
      </div>
    </div>
  </footer>

  <script src="../scripts/main.js"></script>
  <script src="../scripts/contact.js"></script>
</body>
</html>
